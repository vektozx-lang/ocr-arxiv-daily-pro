<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR arXiv Daily Pro v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            color: #1e2937;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        .title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 2.8rem;
            font-weight: 700;
            color: #1e40af;
        }
        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 8px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 32px;
            margin-bottom: 24px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1e2937;
        }
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .report-desc {
            color: #64748b;
            font-size: 1rem;
            line-height: 1.5;
        }
        footer {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="title">
                📄 OCR arXiv Daily Pro
            </div>
            <p class="subtitle">v2.0 · 每日 OCR / 文档解析研究日报 · Powered by DeepSeek</p>
        </header>

        <!-- 今日研究日报卡片 -->
        <div class="card">
            <div class="section-title">
                📅 今日研究日报
            </div>
            
            <a href="https://github.com/vektozx-lang/ocr-arxiv-daily-pro/blob/main/output/LATEST.md" class="btn" target="_blank">
                快捷总结
            </a>
            <p class="report-desc">
                OCR / 文档解析研究日报<br>
                今日高相关论文 + 趋势判断 + 工程启发
            </p>

            <a href="https://github.com/vektozx-lang/ocr-arxiv-daily-pro/blob/main/output/daily_arxiv_docparse_ocr_pro.md" class="btn" target="_blank" style="margin-top: 24px;">
                完整报告
            </a>
            <p class="report-desc">
                中文深度分析 · 创新点拆解 · 未来方向 · 工程价值
            </p>
        </div>

        <!-- 历史归档卡片 -->
        <div class="card">
            <div class="section-title">
                📂 历史归档
            </div>
            <a href="https://github.com/vektozx-lang/ocr-arxiv-daily-pro/tree/main/output/archive" target="_blank" style="color:#3b82f6; font-size:1.1rem; text-decoration:underline;">
                查看所有历史日报 →
            </a>
        </div>

        <footer>
            <p>每天北京时间 09:10 自动更新 · 抓取最近 3 天论文</p>
            <p>Made with ❤️ for OCR & Document AI 研究者</p>
        </footer>
    </div>
</body>
</html>
