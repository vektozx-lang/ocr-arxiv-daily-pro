<body>

uently struggle with writers exhibiting highly specific styles that are underrepresented ...", "link": "https://arxiv.org/abs/2603.29450v1", "pdf": "https://arxiv.org/pdf/2603.29450v1"}, {"title": "L-ReLF: A Framework for Lexical Dataset Creation", "summary": "This paper introduces the L-ReLF (Low-Resource Lexical Framework), a novel, reproducible methodology for creating high-quality, structured lexical datasets for underserved languages. The lack of stand...", "link": "https://arxiv.org/abs/2603.29346v1", "pdf": "https://arxiv.org/pdf/2603.29346v1"}, {"title": "SiPaKosa: A Comprehensive Corpus of Canonical and Classical Buddhist Texts in Sinhala and Pali", "summary": "SiPaKosa is a comprehensive corpus of Sinhala and Pali doctrinal texts comprising approximately 786K sentences and 9.25M words, incorporating 16 copyright-cleared historical Buddhist documents alongsi...", "link": "https://arxiv.org/abs/2603.29221v1", "pdf": "https://arxiv.org/pdf/2603.29221v1"}, {"title": "Xuanwu: Evolving General Multimodal Models into an Industrial-Grade Foundation for Content Ecosystems", "summary": "In recent years, multimodal large models have continued to improve on general benchmarks. However, in real-world content moderation and adversarial settings, mainstream models still suffer from degrad...", "link": "https://arxiv.org/abs/2603.29211v1", "pdf": "https://arxiv.org/pdf/2603.29211v1"}, {"title": "Navigating the Mirage: A Dual-Path Agentic Framework for Robust Misleading Chart Question Answering", "summary": "Despite the success of Vision-Language Models (VLMs), misleading charts remain a significant challenge due to their deceptive visual structures and distorted data representations. We present ChartCyni...", "link": "https://arxiv.org/abs/2603.28583v1", "pdf": "https://arxiv.org/pdf/2603.28583v1"}, {"title": "Hydra: Unifying Document Retrieval and Generation in a Single Vision-Language Model", "summary": "Visual document understanding typically requires separate retrieval and generation models, doubling memory and system complexity. We present Hydra, a dual-head approach that provides both ColBERT-styl...", "link": "https://arxiv.org/abs/2603.28554v1", "pdf": "https://arxiv.org/pdf/2603.28554v1"}];
        function render() {
            const term = document.getElementById('search').value.toLowerCase();
            let html = '';
            papers.forEach(p => {
                if (p.title.toLowerCase().includes(term) || p.summary.toLowerCase().includes(term)) {
                    html += `<div class="card"><h3><a href="${p.link}" target="_blank">${p.title}</a></h3><p>${p.summary}</p><a href="${p.pdf}" target="_blank">📥 PDF</a></div>`;
                }
            });
            document.getElementById('papers').innerHTML = html || '<p>没有找到匹配的论文</p>';
        }
        document.getElementById('search').addEventListener('input', render);
        render();
    </script>
</body>
</html>
